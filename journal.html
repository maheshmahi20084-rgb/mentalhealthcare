<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCare Journal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#4f7ac3;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.header{
background:#6c63ff;
color:rgba(255, 255, 255, 0.453);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

textarea{
width:100%;
height:140px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

button{
background:#6c63ff;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
margin-top:15px;
}

.result{
font-size:22px;
font-weight:bold;
margin-top:15px;
}

.entry{
padding:15px;
border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📝 Smart Journal</h1>
<p>Reflect on your day and track your thoughts.</p>
</div>

<div class="card">

<h3>🙏 What are you grateful for today?</h3>
<textarea id="gratitude"></textarea>

<h3 style="margin-top:20px;">
😊 How was your day?
</h3>
<textarea id="journal"></textarea>

<button onclick="saveJournal()">
Save Journal
</button>

<div class="result" id="analysis">
Analysis Pending...
</div>

</div>

<div class="card">

<h2>📚 Journal History</h2>

<div id="history"></div>

</div>

</div>

<script>

function saveJournal(){

let gratitude=
document.getElementById("gratitude").value;

let journal=
document.getElementById("journal").value;

let text=
(gratitude+" "+journal).toLowerCase();

let mood="😐 Neutral";

if(
text.includes("happy") ||
text.includes("good") ||
text.includes("grateful") ||
text.includes("excited")
){
mood="😊 Positive Entry";
}

if(
text.includes("sad") ||
text.includes("stress") ||
text.includes("worried") ||
text.includes("angry")
){
mood="😔 Needs Attention";
}

document.getElementById("analysis").innerHTML=
mood;

let journals=
JSON.parse(
localStorage.getItem("journals")
) || [];

journals.push({
date:new Date().toLocaleDateString(),
gratitude,
journal,
mood
});

localStorage.setItem(
"journals",
JSON.stringify(journals)
);

loadHistory();
}

function loadHistory(){

let journals=
JSON.parse(
localStorage.getItem("journals")
) || [];

let output="";

journals.reverse().forEach(j=>{

output+=`
<div class="entry">

<b>${j.date}</b><br><br>

🙏 ${j.gratitude}<br><br>

📝 ${j.journal}<br><br>

${j.mood}

</div>
`;

});

document.getElementById("history").innerHTML=
output;
}

loadHistory();

</script>

</body>
</html>
