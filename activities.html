<!DOCTYPE html>
<html>
<head>
<title>MindCare Activities</title>

<style>
body{
font-family:Arial;
background:#f4f7fc;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

h1{
color:#6c63ff;
}

.task{
padding:10px;
font-size:18px;
}

.progress{
width:100%;
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#6c63ff;
transition:.5s;
}

.score{
font-size:35px;
font-weight:bold;
color:#6c63ff;
}

.badge{
font-size:24px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h1>🏃 Daily Wellness Activities</h1>

<div class="task">
<input type="checkbox" onclick="calculate()"> 💧 Drink 8 Glasses Water
</div>

<div class="task">
<input type="checkbox" onclick="calculate()"> 🚶 Walk 5000 Steps
</div>

<div class="task">
<input type="checkbox" onclick="calculate()"> 🧘 Meditation 10 Minutes
</div>

<div class="task">
<input type="checkbox" onclick="calculate()"> 📖 Read 20 Minutes
</div>

<div class="task">
<input type="checkbox" onclick="calculate()"> 😴 Sleep Before 11 PM
</div>

<div class="task">
<input type="checkbox" onclick="calculate()"> 🌞 Morning Exercise
</div>

<div class="task">
<input type="checkbox" onclick="calculate()"> 🙏 Gratitude Practice
</div>

</div>

<div class="card">

<h2>Today's Progress</h2>

<div class="score" id="score">
0%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="badge" id="badge">
🌱 Beginner
</div>

</div>

</div>

<script>

function calculate(){

let checks=
document.querySelectorAll("input[type='checkbox']");

let completed=0;

checks.forEach(box=>{

if(box.checked){
completed++;
}

});

let percent=
Math.round((completed/checks.length)*100);

document.getElementById("score").innerHTML=
percent + "%";

document.getElementById("bar").style.width=
percent + "%";

localStorage.setItem(
"activityScore",
percent
);

let badge="🌱 Beginner";

if(percent>=50)
badge="🌿 Consistent";

if(percent>=80)
badge="🌳 Wellness Champion";

if(percent==100)
badge="🏆 Perfect Day";

document.getElementById("badge").innerHTML=
badge;
}

</script>

</body>
</html>
