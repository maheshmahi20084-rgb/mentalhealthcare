<!DOCTYPE html>
<html>
<head>
<title>Settings</title>

<style>
body{
font-family:Segoe UI;
background:#eef4ff;
padding:20px;
}

.card{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="card">

<h2>⚙️ Settings</h2>

<button onclick="darkMode()">
🌙 Toggle Dark Mode
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<script>

function darkMode(){

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
document.body.style.background="#111827";
document.body.style.color="white";
}else{
document.body.style.background="#eef4ff";
document.body.style.color="black";
}

}

function logout(){

localStorage.removeItem("user");

window.location="login.html";

}

</script>

</body>
</html><!DOCTYPE html>
<html>
<head>
<title>Sleep Tracker</title>

<style>

body{
font-family:Segoe UI;
background:#eef4ff;
padding:20px;
}

.card{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

input{
width:100%;
padding:15px;
margin-top:10px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
margin-top:10px;
}

.score{
font-size:40px;
color:#2563eb;
text-align:center;
}

</style>

</head>

<body>

<div class="card">

<h2>😴 Sleep Tracker</h2>

<input type="number"
id="sleep"
placeholder="Hours Slept">

<button onclick="saveSleep()">
Save Sleep
</button>

<div class="score"
id="score">
0%
</div>

</div>

<script>

function saveSleep(){

let sleep=
document.getElementById("sleep").value;

let score=
Math.min(
100,
Math.round((sleep/8)*100)
);

document.getElementById("score").innerHTML=
score+"%";

localStorage.setItem(
"sleepScore",
score
);

}

</script>

</body>
</html>
