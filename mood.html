<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCare - Mood Tracker</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
background:#6c63ff;
color:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.mood-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-bottom:20px;
}

.mood-card{
background:white;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
transition:.3s;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.mood-card:hover{
transform:translateY(-5px);
}

.mood-card span{
font-size:40px;
display:block;
margin-bottom:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.stat-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.history{
margin-top:25px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.history-item{
padding:10px;
border-bottom:1px solid #ddd;
}

.score{
font-size:40px;
font-weight:bold;
color:#6c63ff;
}

canvas{
width:100%;
height:300px;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🧠 Mood Tracker Dashboard</h1>
<p>Track your emotional wellness every day</p>
</div>

<h2>Select Today's Mood</h2>

<div class="mood-grid">

<div class="mood-card" onclick="saveMood('Happy',100,'😊')">
<span>😊</span>
Happy
</div>

<div class="mood-card" onclick="saveMood('Calm',90,'😌')">
<span>😌</span>
Calm
</div>

<div class="mood-card" onclick="saveMood('Neutral',70,'😐')">
<span>😐</span>
Neutral
</div>

<div class="mood-card" onclick="saveMood('Sad',40,'😔')">
<span>😔</span>
Sad
</div>

<div class="mood-card" onclick="saveMood('Stressed',20,'😫')">
<span>😫</span>
Stressed
</div>

<div class="mood-card" onclick="saveMood('Excited',95,'🤩')">
<span>🤩</span>
Excited
</div>

</div>

<div class="stats">

<div class="stat-box">
<h3>Today's Wellness Score</h3>
<div class="score" id="score">0%</div>
</div>

<div class="stat-box">
<h3>Current Mood</h3>
<h2 id="currentMood">No Mood Selected</h2>
</div>

</div>

<div class="history">
<h2>Weekly Mood Trend</h2>

0

</div>

<div class="history">
<h2>Mood History</h2>
<div id="history"></div>
</div>

</div>

<script>

function saveMood(mood,score,emoji){

let moods=
JSON.parse(localStorage.getItem("moods")) || [];

let entry={
date:new Date().toLocaleDateString(),
mood:mood,
score:score,
emoji:emoji
};

moods.push(entry);

localStorage.setItem(
"moods",
JSON.stringify(moods)
);

document.getElementById("score").innerHTML=
score + "%";

document.getElementById("currentMood").innerHTML=
emoji + " " + mood;

loadHistory();
}

function loadHistory(){

let moods=
JSON.parse(localStorage.getItem("moods")) || [];

let output="";

moods.reverse().forEach(item=>{

output += `
<div class="history-item">
${item.emoji} <b>${item.mood}</b>
- ${item.score}% |
${item.date}
</div>
`;

});

document.getElementById("history").innerHTML=
output;
}

loadHistory();

</script>

</body>
</html>
